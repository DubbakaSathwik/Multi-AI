<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MultiAi - Sign In</title>
    <style>
        :root {
            --bg: #030712;
            --nebula: #1e1b4b;
            --accent: #6366f1;
            --accent-glow: rgba(99, 102, 241, 0.5);
            --card-glass: rgba(15, 23, 42, 0.7);
            --font-family: 'Inter', system-ui, sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: var(--font-family); }
        
        body {
            background-color: var(--bg);
            background: radial-gradient(circle at 50% 50%, var(--nebula) 0%, var(--bg) 80%);
            color: #ffffff;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            perspective: 1200px;
        }

        /* Moving Grid Effect */
        body::before {
            content: "";
            position: absolute;
            width: 200%;
            height: 200%;
            top: -50%;
            left: -50%;
            background-image: 
                linear-gradient(rgba(99, 102, 241, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(99, 102, 241, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            transform: rotateX(60deg);
            z-index: 0;
            animation: gridMove 20s linear infinite;
        }

        @keyframes gridMove {
            from { transform: rotateX(60deg) translateY(0); }
            to { transform: rotateX(60deg) translateY(50px); }
        }

        #core-container {
            position: absolute;
            z-index: 1;
            filter: drop-shadow(0 0 20px var(--accent-glow));
        }

        .core-sphere {
            width: 450px;
            height: 450px;
            position: relative;
            transform-style: preserve-3d;
            animation: rotateCore 25s linear infinite;
        }
        
        .core-sphere div {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 1px solid rgba(99, 102, 241, 0.15);
        }
        
        .core-sphere div:nth-child(1) { transform: rotateY(0deg); }
        .core-sphere div:nth-child(2) { transform: rotateY(45deg); }
        .core-sphere div:nth-child(3) { transform: rotateY(90deg); }
        .core-sphere div:nth-child(4) { transform: rotateY(135deg); }
        .core-sphere div:nth-child(5) { transform: rotateX(45deg); }
        .core-sphere div:nth-child(6) { transform: rotateX(90deg); }

        @keyframes rotateCore {
            from { transform: rotateX(0deg) rotateY(0deg); }
            to { transform: rotateX(360deg) rotateY(360deg); }
        }

        #portal-container {
            z-index: 10;
            width: 400px;
            height: 520px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        
        #portal-container.show-register { transform: rotateY(180deg); }

        .card {
            width: 100%;
            height: 100%;
            background: var(--card-glass);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 40px;
            position: absolute;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }
        
        .register-card { transform: rotateY(180deg); }

        .header-box { text-align: center; margin-bottom: 30px; }
        .header-box h2 { font-size: 1.5rem; font-weight: 700; color: #fff; }

        .input-wrap { display: flex; flex-direction: column; gap: 15px; margin-bottom: 25px; }
        
        .field label { font-size: 0.75rem; color: rgba(255,255,255,0.6); margin-bottom: 8px; display: block; }

        input {
            width: 100%;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 14px;
            border-radius: 12px;
            color: #fff;
            outline: none;
            transition: 0.3s;
        }

        input:focus { border-color: var(--accent); background: rgba(99, 102, 241, 0.1); }

        .btn-prime {
            background: var(--accent);
            color: #fff;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-prime:hover { transform: translateY(-2px); filter: brightness(1.1); }

        .guest-link {
            text-align: center;
            margin-top: 15px;
            font-size: 0.85rem;
            color: var(--accent);
            cursor: pointer;
            font-weight: 500;
            text-decoration: underline;
        }

        .switch-link {
            text-align: center;
            font-size: 0.8rem;
            margin-top: auto;
            color: rgba(255,255,255,0.5);
        }
        .switch-link b { color: var(--accent); cursor: pointer; }

    </style>
</head>
<body>

    <div id="core-container">
        <div class="core-sphere" id="visual-core">
            <div></div><div></div><div></div><div></div><div></div><div></div>
        </div>
    </div>

    <div id="portal-container">
        
        <div class="card login-card">
            <div class="header-box">
                <h2>Sign In</h2>
            </div>
            
            <div class="input-wrap">
                <div class="field">
                    <label>Username</label>
                    <input type="text" id="login-user" placeholder="Enter username">
                </div>
                <div class="field">
                    <label>Password</label>
                    <input type="password" id="login-pass" placeholder="Enter password">
                </div>
            </div>
            
            <button class="btn-prime" onclick="login()">Sign In</button>
            <div class="guest-link" onclick="guestEntry()">Continue as Guest</div>
            
            <div class="switch-link">
                New here? <b onclick="flip(true)">Sign Up</b>
            </div>
        </div>

        <div class="card register-card">
            <div class="header-box">
                <h2>Sign Up</h2>
            </div>
            
            <div class="input-wrap">
                <div class="field">
                    <label>Full Name</label>
                    <input type="text" id="reg-user" placeholder="Your name">
                </div>
                <div class="field">
                    <label>Email</label>
                    <input type="email" id="reg-email" placeholder="Your email">
                </div>
                <div class="field">
                    <label>Password</label>
                    <input type="password" id="reg-pass" placeholder="Create password">
                </div>
            </div>
            
            <button class="btn-prime" onclick="register()">Create Account</button>
            
            <div class="switch-link">
                Have an account? <b onclick="flip(false)">Sign In</b>
            </div>
        </div>
    </div>

    <script>
        // Flip between Sign In and Sign Up
        function flip(showRegister) {
            const container = document.getElementById('portal-container');
            if (showRegister) container.classList.add('show-register');
            else container.classList.remove('show-register');
        }

        // Logic to actually log in
        async function login() {
            const user = document.getElementById('login-user').value.trim();
            const pass = document.getElementById('login-pass').value;
            
            if (!user || !pass) {
                alert("Please fill in all fields.");
                return;
            }

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: user, password: pass })
                });
                
                const data = await response.json();
                
                if (response.ok && data.success) {
                    localStorage.setItem('isLoggedIn', 'true');
                    localStorage.setItem('neuralUser', data.username);
                    localStorage.setItem('neuralEmail', data.email);
                    localStorage.setItem('token', data.token);
                    
                    // Fetch preferences immediately after login
                    await fetchPreferences(data.token);
                    
                    window.location.href = 'index.html';
                } else {
                    alert(data.message || "Login failed");
                }
            } catch (error) {
                console.error("Login error:", error);
                alert("Unable to connect to the authentication server.");
            }
        }

        async function register() {
            const user = document.getElementById('reg-user').value.trim();
            const email = document.getElementById('reg-email').value.trim();
            const pass = document.getElementById('reg-pass').value;
            
            if (!user || !email || !pass) {
                alert("Please fill in all fields.");
                return;
            }

            try {
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: user, email, password: pass })
                });
                
                const data = await response.json();
                
                if (response.ok && data.success) {
                    localStorage.setItem('isLoggedIn', 'true');
                    localStorage.setItem('neuralUser', data.username);
                    localStorage.setItem('neuralEmail', data.email);
                    localStorage.setItem('token', data.token);
                    
                    // Set empty preferences locally for new user
                    localStorage.setItem('modelLikes', JSON.stringify({}));
                    localStorage.setItem('modelDislikes', JSON.stringify({}));
                    
                    window.location.href = 'index.html';
                } else {
                    alert(data.message || "Registration failed");
                }
            } catch (error) {
                console.error("Registration error:", error);
                alert("Unable to connect to the authentication server.");
            }
        }

        function guestEntry() {
            localStorage.setItem('isLoggedIn', 'true');
            localStorage.setItem('neuralUser', 'Guest');
            localStorage.setItem('neuralEmail', 'guest@multiai.system');
            localStorage.removeItem('token');
            localStorage.removeItem('modelLikes');
            localStorage.removeItem('modelDislikes');
            window.location.href = 'index.html';
        }

        async function fetchPreferences(token) {
            try {
                const res = await fetch('/api/user/preference', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const prefData = await res.json();
                if (res.ok && prefData.success) {
                    localStorage.setItem('modelLikes', JSON.stringify(prefData.likes || {}));
                    localStorage.setItem('modelDislikes', JSON.stringify(prefData.dislikes || {}));
                }
            } catch (err) {
                console.error("Failed to fetch user preferences on login:", err);
            }
        }

        // Core reacts to typing
        const inputs = document.querySelectorAll('input');
        const core = document.getElementById('visual-core');

        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                core.style.animationDuration = '5s';
            });
            input.addEventListener('blur', () => {
                core.style.animationDuration = '25s';
            });
        });
    </script>
</body>
</html>
